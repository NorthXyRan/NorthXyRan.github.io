- text: "I've been looking for some co-authors who share the same interests. If you are also interested in HCI, AI4Edu, or any other related fields, welcome to chat with me!"
  date: "Pinned 📌"
- text: "Joined a new project led by Prof. Wei Zeng (HKUST GZ) on <strong>Automatic generation of structured learning dashboards for instructors</strong>. Our work is in preparation for IEEE VIS 2026."
  date: "26/2/13"
- text: "As a co-author of the project <strong>AI-Supported Learning Survey</strong> led by Prof. Yong Wang (NTU), our paper was submitted to the ACM SIGCHI Conference on Designing Interactive Systems (DIS 2026)."
  date: "26/1/20"
- text: "Congratulate🎉🎉🎉! Our paper, <strong>Open-ended Structured Question Assessment with Human-LLM Collaboration</strong>, is accepted by CHI 2026! It's my first paper and also my first-author paper accepted by a top-tier conference! Thank you very much to my advisor Prof. Zikun Deng! Let's meet in Barcelona!"
  date: "26/1/16"
- text: "A first-author paper was submitted to The ACM CHI Conference on Human Factors in Computing Systems (CHI 2026)."
